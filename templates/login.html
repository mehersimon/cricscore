{% extends 'base.html' %}
{% set is_admin = false %}
{% block title %}Admin Login — CricScore{% endblock %}
{% block content %}

<div class="login-container">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:3rem;filter:drop-shadow(0 0 15px var(--green-vivid));margin-bottom:0.5rem">🏏</div>
      <div class="login-title">CricScore</div>
      <div class="login-subtitle">Admin Access Portal</div>
    </div>

    {% if error %}
    <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label" for="username">Login ID</label>
        <input type="text" id="username" name="username" class="form-input"
          placeholder="Enter your ID" autocomplete="off" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input"
          placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem">
        🔐 Login
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;color:var(--muted);font-size:0.85rem">
      <p>Default: ID <span style="color:var(--green-vivid)">123</span> / Pass <span style="color:var(--green-vivid)">123</span></p>
    </div>

    <div style="text-align:center;margin-top:1rem">
      <a href="/" style="color:var(--muted);font-size:0.85rem;text-decoration:none;hover:color:var(--white)">← Back to Home</a>
    </div>
  </div>
</div>

{% endblock %}
